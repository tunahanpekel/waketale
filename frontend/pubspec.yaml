name: waketale
description: "Waketale v2 — AI-powered CBT-I sleep coach."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Backend
  supabase_flutter: ^2.12.2

  # Monetization
  purchases_flutter: ^9.15.1

  # Analytics / Crash
  firebase_core: ^4.6.0
  firebase_crashlytics: ^5.1.0
  firebase_analytics: ^12.2.0
  firebase_messaging: ^16.1.3
  mixpanel_flutter: ^2.5.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # HTTP / AI
  http: ^1.2.1

  # Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

  # Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # UI
  google_fonts: ^8.0.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  fl_chart: ^0.69.0

  # Wearables / Health
  health: ^12.2.0

  # Utils
  intl: "0.20.2"   # EXACT PIN — no caret/range. Flutter 3.41.5/Dart 3.9 required
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  json_serializable: ^6.13.0
  freezed: ^3.2.5
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true

  # assets: uncomment when directories exist
  # assets:
  #   - assets/images/
  #   - assets/animations/
  #   - assets/sounds/
  #   - assets/lottie/

  # fonts: (using google_fonts package instead for runtime font loading)
