name: CI

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Setup Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601f81e6058e503b01  # v2
        with:
          flutter-version-file: source/frontend/pubspec.yaml
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: source/frontend
        run: flutter pub get

      - name: Generate code
        working-directory: source/frontend
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format check
        working-directory: source/frontend
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        working-directory: source/frontend
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  build-check:
    name: Android Debug Build
    runs-on: ubuntu-latest
    needs: [analyze]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Setup Java
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12  # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Restore Gradle Cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}

      - name: Setup Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601f81e6058e503b01  # v2
        with:
          flutter-version-file: source/frontend/pubspec.yaml
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: source/frontend
        run: flutter pub get

      - name: Generate code
        working-directory: source/frontend
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        working-directory: source/frontend
        run: |
          flutter build apk --debug \
            --dart-define=APP_ENV=dev \
            --dart-define=SUPABASE_URL=https://mock.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=mock_key \
            --dart-define=REVENUECAT_GOOGLE_KEY=mock_android \
            --dart-define=MIXPANEL_TOKEN=mock_mixpanel
